<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0d1b2a"/>
  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="70" height="70" patternUnits="userSpaceOnUse">
      <path d="M 70 0 L 0 0 0 70" fill="none" stroke="rgba(245,166,35,0.04)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(245,166,35,0.08)"/>
      <stop offset="100%" stop-color="rgba(13,27,42,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="315" rx="500" ry="320" fill="url(#glow)"/>

  <!-- Wheel logo (scaled up, centered) -->
  <g transform="translate(452, 165) scale(10)">
    <circle cx="15" cy="15" r="13.5" stroke="#f5a623" stroke-width="1.1" fill="none"/>
    <circle cx="15" cy="15" r="2.8" fill="#f5a623"/>
    <line x1="15" y1="1.5" x2="15" y2="12.2" stroke="#f5a623" stroke-width=".9"/>
    <line x1="15" y1="17.8" x2="15" y2="28.5" stroke="#f5a623" stroke-width=".9"/>
    <line x1="1.5" y1="15" x2="12.2" y2="15" stroke="#f5a623" stroke-width=".9"/>
    <line x1="17.8" y1="15" x2="28.5" y2="15" stroke="#f5a623" stroke-width=".9"/>
    <line x1="4.4" y1="4.4" x2="12.1" y2="12.1" stroke="#f5a623" stroke-width=".9"/>
    <line x1="17.9" y1="17.9" x2="25.6" y2="25.6" stroke="#f5a623" stroke-width=".9"/>
    <line x1="25.6" y1="4.4" x2="17.9" y2="12.1" stroke="#f5a623" stroke-width=".9"/>
    <line x1="12.1" y1="17.9" x2="4.4" y2="25.6" stroke="#f5a623" stroke-width=".9"/>
  </g>

  <!-- Title text -->
  <text x="600" y="460" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#eef2f7" text-anchor="middle" letter-spacing="8">NATIONAL <tspan fill="#f5a623">RIDE</tspan> NETWORK</text>

  <!-- Tagline -->
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="26" fill="#7a9ab8" text-anchor="middle" letter-spacing="4">FIND EVERY RIDE · UNLOCK EVERY CITY</text>

  <!-- Bottom amber line -->
  <rect x="480" y="555" width="240" height="3" rx="2" fill="#f5a623"/>
</svg>
